[[commands]]
id = "uname"
command = "uname -s"
description = "Quick sanity check on the local machine."

[[commands]]
id = "sleep"
command = "sleep $SLEEP_SECONDS"

[[commands]]
id = "whoami"
command = "whoami"

[[commands]]
id = "create_tmp_file"
command = "echo hi > hi.txt"
cwd = "$HOME"

[[commands]]
id = "create_tmp_files"
command = "cd $HOME && mkdir -p tmp/tmp && echo hi > tmp/hi.txt && echo hello > tmp/tmp/hello.txt"
