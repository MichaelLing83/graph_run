[[servers]]
id = "local"
kind = "local"
description = "This machine; commands run without a remote session."
timeout = 300   # 5 minutess

[[servers]]
id = "test_remote_ssh"
kind = "remote"
transport = "ssh"
host = "${REMOTE_HOST_A_IP}"
port = "${REMOTE_HOST_A_PORT}"
user = "${REMOTE_HOST_A_USER}"
# Optional: password = "${REMOTE_HOST_A_PASSWORD}"  # or use password_env + export in the shell
description = "Placeholder SSH host; replace host/user or skip in CI."
timeout = 300   # 5 minutess
