# Cyclic success graph (requires --allow-endless-loop).
# Every edge gets failure = "abort" by default when the key is omitted.

[[nodes]]
id = "local-bash-show-path"
# if type is missing then it defaults to "task", we find corresponding task by node's id
# if name is missing then it defaults to the same value as id

[[nodes]]
id = "local-zsh-pwd-tmp"

[[nodes]]
id = "sleep_3s"

[[edges]]
from = "start"
to = "local-bash-show-path"

[[edges]]
from = "local-bash-show-path"
to = "sleep_3s"

[[edges]]
from = "sleep_3s"
to = "local-zsh-pwd-tmp"

[[edges]]
from = "local-zsh-pwd-tmp"
to = "local-bash-show-path"
