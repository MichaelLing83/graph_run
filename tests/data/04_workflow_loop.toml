# Acyclic workflow: counted loop with a two-node body (task → loop_end).
[[nodes]]
id = "start"
type = "start"

[[nodes]]
id = "end"
type = "end"

[[nodes]]
id = "abort"
type = "abort"

[[nodes]]
id = "demo-loop"
type = "loop"
count = 3

[[nodes]]
id = "sleep_3s"

[[nodes]]
id = "local-bash-show-path"

[[nodes]]
id = "demo-loop-end"
type = "loop_end"
loop = "demo-loop"

[[edges]]
from = "start"
to = "demo-loop"

[[edges]]
from = "demo-loop"
to = "sleep_3s"
failure = "abort"

[[edges]]
from = "demo-loop"
to = "local-bash-show-path"
failure = "abort"

[[edges]]
from = "local-bash-show-path"
to = "demo-loop-end"

[[edges]]
from = "sleep_3s"
to = "demo-loop-end"

[[edges]]
from = "demo-loop-end"
to = "end"
failure = "abort"
