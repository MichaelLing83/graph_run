# Acyclic workflow: counted loop with a two-node body (task → loop_end).
# failure branch defaults to abort on every edge when omitted.

[[nodes]]
id = "demo-loop"
type = "loop"
count = 3

[[nodes]]
id = "sleep_1s"

[[nodes]]
id = "local-bash-show-path"

[[nodes]]
id = "demo-loop-end"
type = "loop_end"
loop = "demo-loop"

[[edges]]
from = "start"
to = "demo-loop"

[[edges]]
from = "demo-loop"
to = "sleep_1s"

[[edges]]
from = "demo-loop"
to = "local-bash-show-path"

[[edges]]
from = "local-bash-show-path"
to = "demo-loop-end"

[[edges]]
from = "sleep_1s"
to = "demo-loop-end"

[[edges]]
from = "demo-loop-end"
to = "end"
