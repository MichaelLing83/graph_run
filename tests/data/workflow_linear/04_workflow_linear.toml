# Acyclic workflow for tests and smoke runs (start → one task → end).
# start, end, and abort nodes are injected when omitted (ids: start, end, abort).
# Task nodes matching `[[tasks]].id` are injected when omitted.

[[edges]]
from = "start"
to = "local-bash-show-path"

[[edges]]
from = "local-bash-show-path"
to = "end"
